name: CI/CD — Build & Deploy

on:
  push:
    branches: [main]

# IMAGE is lowercased because GHCR requires lowercase image names
env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. Build Docker image and push to GHCR ─────────────────────────────────
  build:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to ghcr.io
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the image name (GHCR requirement)
      - name: Normalise image name
        id: image
        run: echo "name=${IMAGE,,}" >> $GITHUB_OUTPUT
        env:
          IMAGE: ${{ env.IMAGE }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          # GitHub Actions cache — speeds up layer reuse across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Azure Container Apps ──────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: production    # optional: add approval rules in GitHub → Settings → Environments

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Normalise image name
        id: image
        run: echo "name=${IMAGE,,}" >> $GITHUB_OUTPUT
        env:
          IMAGE: ${{ env.IMAGE }}

      - name: Update container image
        run: |
          az containerapp update \
            --name            "${{ vars.ACA_NAME }}" \
            --resource-group  "${{ vars.ACA_RG }}" \
            --image           "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            --registry-server   ghcr.io \
            --registry-username "${{ github.actor }}" \
            --registry-password "${{ secrets.GHCR_TOKEN }}"

      - name: Print deployment URL
        run: |
          URL=$(az containerapp show \
            --name           "${{ vars.ACA_NAME }}" \
            --resource-group "${{ vars.ACA_RG }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "✅ Deployed → https://$URL"
